; UE4SS Settings
; Force UE4SS to target Unreal Engine 4.26 (required for Psychonauts 2).
; Copy this file into the Psychonauts 2 game root alongside UE4SS.dll.

[General]
; Set to 1 to enable UE4SS mod loading
ModLoading=1

; Lua mods directory (relative to game root)
ModsDir=Mods

[Debug]
; Set to 1 to enable the UE4SS debug console (useful during development)
DebugConsoleEnabled=0

[EngineVersion]
; Pin to UE 4.26 so UE4SS resolves the correct GObjects / GNames offsets
MajorVersion=4
MinorVersion=26
PatchVersion=0
