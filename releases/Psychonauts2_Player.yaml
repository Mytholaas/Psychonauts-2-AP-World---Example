# Psychonauts 2 Archipelago Player Configuration
# See https://archipelago.gg for more information

# !! CHANGE THIS before uploading — must be unique in the multiworld !!
name: Player1

# The game you are playing
game: Psychonauts 2

# Game-specific options for Psychonauts 2
Psychonauts 2:
  
  # Win Condition
  # Determines what you must accomplish to complete your game
  # 
  # Options:
  #   normal - Obtain core psychic abilities, unlock key areas, defeat Maligula
  #   all_bosses - Obtain all 8 psychic abilities, complete 4 boss worlds, defeat Maligula  
  #   all_scav_hunt - Collect all 16 scavenger hunt items (game completes, no Maligula fight)
  #   scav_hunt_and_maligula - Scavenger hunt items unlock Maligula fight, then defeat her
  #
  win_condition: normal
  
  # Starting Outfit
  # Choose which outfit Raz wears at the start
  # The other 3 outfits will be shuffled into the item pool
  #
  # Options:
  #   normal_outfit - Default Psychonauts 2 look
  #   tried_and_true - Classic Psychonauts 1 outfit
  #   circus_skivvies - Circus performance costume
  #   suit - Formal suit
  #
  starting_outfit: normal_outfit
  
  # Include Shop Items
  # When enabled, all 48 shop locations are randomized
  # When disabled, shop items stay in their vanilla locations
  #
  # Options:
  #   true - Include shop items in randomization (607 total locations)
  #   false - Exclude shop items (559 locations)
  #
  include_shop_items: true
  
  # Death Link
  # When you die, everyone in your Death Link group dies
  # When someone in your group dies, you die too
  #
  # Options:
  #   false - Disabled (recommended for first playthrough)
  #   true - Enabled (for added challenge)
  #
  death_link: false

# Archipelago General Options

# Accessibility
# Determines item placement logic
#
# Options:
#   locations - All locations must be reachable (recommended)
#   items - All items must be obtainable
#   minimal - Minimal accessibility requirements
#
accessibility: locations

# Progression Balancing
# Higher values make your own progression items more likely to be in your world
# Lower values make them more likely to be in other players' worlds
#
# Range: 0-99 (default: 50)
#
progression_balancing: 50

# Local Items
# Items that will always be in your own world
# Example: ["Progressive Telekinesis", "Progressive Levitation"]
#
local_items: []

# Non-Local Items  
# Items that will never be in your own world
# Example: ["Progressive Time Bubble"]
#
non_local_items: []

# Start Inventory
# Items you start with (in addition to default starting items)
# Example: {"Progressive Telekinesis": 1, "Smelling Salts": 5}
#
start_inventory: {}

# Start Hints
# Locations to automatically hint at game start
# Example: ["Hollis' Office - Memory Vault"]
#
start_hints: []

# Exclude Locations
# Locations that will contain junk items (useful for very difficult checks)
# Example: ["Hollis' Hot Streak - Psi Challenge Marker 3"]
#
exclude_locations: []

# Priority Locations
# Locations more likely to contain progression items
# Example: ["Ford's Follicles - Brain"]
#
priority_locations: []

# Item Links
# Link your item pool with other players
# See Archipelago documentation for details
#
item_links: []

